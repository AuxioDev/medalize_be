# Full stack: API + Postgres + Redis + Celery worker + Nginx (TLS).
#
# Setup on a fresh VPS:
#   1. cp .env.example .env  (fill SECRET_KEY, JWT_SECRET_KEY, DB_PASSWORD, …)
#   2. mkdir -p nginx/certs
#   3. docker compose up --build -d web db redis   # start without nginx first
#   4. certbot certonly --standalone -d yourdomain.com
#      # Places certs in /etc/letsencrypt/live/yourdomain.com/
#   5. ln -s /etc/letsencrypt/live/yourdomain.com/fullchain.pem nginx/certs/fullchain.pem
#      ln -s /etc/letsencrypt/live/yourdomain.com/privkey.pem  nginx/certs/privkey.pem
#   6. docker compose up -d nginx
#   7. docker compose exec web python manage.py seed_data --clear   # optional test data
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-medalize_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: >-
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi --bind 0.0.0.0:8000 --workers 3"
    # Port 8000 is NOT exposed to the host — nginx is the only entry point.
    # For local development without nginx, temporarily add: ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: celery -A config worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Scheduled tasks: appointment reminders, auto-complete past appointments
  # (see CELERY_BEAT_SCHEDULE in config/settings.py).
  beat:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: celery -A config beat -l info
    depends_on:
      - db
      - redis

volumes:
  pgdata:
